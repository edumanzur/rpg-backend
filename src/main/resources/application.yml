spring:
  profiles:
    active: local

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:public.key
          private-key-location: classpath:private.key

jwt:
  public:
    key: classpath:public.key
  private:
    key: classpath:private.key